version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: futureme-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-futureme_db}
      POSTGRES_USER: ${DB_USER:-futureme_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-futureme_user}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - futureme-network

  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: futureme-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_TYPE: postgres
      DATABASE_URL: postgresql://${DB_USER:-futureme_user}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-futureme_db}
      SOCKET_ENABLED: 'true'
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - futureme-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend Web Server
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.yourdomain.com}
        VITE_WS_URL: ${VITE_WS_URL:-wss://api.yourdomain.com}
    container_name: futureme-frontend
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - backend
    volumes:
      - ./apps/frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro # For SSL certificates
    restart: unless-stopped
    networks:
      - futureme-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost/health.txt']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local

networks:
  futureme-network:
    driver: bridge

# To start: docker-compose up -d
# To stop: docker-compose down
# To view logs: docker-compose logs -f backend
# To rebuild: docker-compose up -d --build
